document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

or:#9a9ca6; margin-bottom:16px;\">\n                <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9a9ca6\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4.3-4.3\"><\u002Fpath><\u002Fsvg>\n                <span style=\"font-size:13px;\">Search apps, actions, and tools<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:12px;\">\n                <div onclick=\"{{ onCatOther }}\" style=\"border:1px solid #e6e7ec; border-radius:10px; padding:18px 10px; text-align:center; cursor:pointer;\">\n                  <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6b6d78\" stroke-width=\"1.7\"><circle cx=\"6\" cy=\"6\" r=\"3\"><\u002Fcircle><circle cx=\"6\" cy=\"18\" r=\"3\"><\u002Fcircle><path d=\"M9 6h7a4 4 0 0 1 4 4v0M9 18h7a4 4 0 0 0 4-4\"><\u002Fpath><\u002Fsvg>\n                  <div style=\"font-size:13px; color:#4a4c57; margin-top:8px;\">Logic<\u002Fdiv>\n                <\u002Fdiv>\n                <div onclick=\"{{ onCatOther }}\" style=\"border:1px solid #e6e7ec; border-radius:10px; padding:18px 10px; text-align:center; cursor:pointer;\">\n                  <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6b6d78\" stroke-width=\"1.7\"><path d=\"M8 6l-5 6 5 6M16 6l5 6-5 6\"><\u002Fpath><\u002Fsvg>\n                  <div style=\"font-size:13px; color:#4a4c57; margin-top:8px;\">Helpers<\u002Fdiv>\n                <\u002Fdiv>\n                <div data-hot=\"cat-app\" onclick=\"{{ onCatApp }}\" style=\"{{ catAppStyle }}\">\n                  <img src=\"a924e5ad-0286-4293-ae1c-b9e67507c050\" alt=\"\" style=\"width:24px; height:24px;\">\n                  <div style=\"font-size:13px; color:#4a4c57; margin-top:8px;\">App<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- actions panel -->\n      <sc-if value=\"{{ showActions }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute; inset:0; background:rgba(16,18,48,.28); display:flex; align-items:center; justify-content:center; z-index:70;\">\n          <div style=\"width:480px; max-height:640px; background:#fff; border-radius:14px; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 24px 60px rgba(10,12,36,.4); animation:wfbFade .25s ease;\">\n            <div style=\"padding:16px 20px; border-bottom:1px solid #eceef1; display:flex; align-items:center; gap:12px;\">\n              <span onclick=\"{{ onBackToAddStep }}\" style=\"cursor:pointer; color:#5a5c68; font-size:13px;\">‹ Back<\u002Fspan>\n              <span style=\"font-size:16px; font-weight:700; color:#2b2d38;\">Actions<\u002Fspan>\n              <span onclick=\"{{ onCloseActions }}\" style=\"margin-left:auto; cursor:pointer; color:#9a9ca6; font-size:18px;\">×<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding:16px 20px; border-bottom:1px solid #eceef1; display:flex; gap:12px; align-items:flex-start;\">\n              <img src=\"a924e5ad-0286-4293-ae1c-b9e67507c050\" alt=\"\" style=\"width:26px; height:26px; margin-top:2px;\">\n              <div>\n                <div style=\"font-weight:700; color:#2b2d38; font-size:14px;\">Momentus Enterprise Standard API<\u002Fdiv>\n                <div style=\"font-size:12px; color:#8a8c96; line-height:1.5; margin-top:3px;\">Native API access for the Enterprise platform — consolidated access to the v1 endpoints via the same gateway used by the enhanced Connect API.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:14px 20px 8px;\">\n              <div style=\"display:flex; align-items:center; gap:10px; height:40px; background:#f4f5f7; border:1px solid #e0e2e7; border-radius:8px; padding:0 12px; color:#9a9ca6;\">\n                <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9a9ca6\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4.3-4.3\"><\u002Fpath><\u002Fsvg>\n                <span style=\"font-size:13px;\">Search actions<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1; overflow:auto; padding:6px 20px 18px;\">\n              <div data-hot=\"act-accounts\" onclick=\"{{ onActAccounts }}\" style=\"{{ actAccountsStyle }}\">\n                <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"font-weight:700; color:#2b2d38; font-size:13.5px;\">Accounts Get Account<\u002Fspan><span style=\"background:#eef0ff; color:#4146e0; font-size:11px; border-radius:5px; padding:1px 7px;\">Basic<\u002Fspan><\u002Fdiv>\n                <div style=\"font-size:12px; color:#8a8c96; margin-top:3px;\">Get a single account by its Org Code and Account Code<\u002Fdiv>\n              <\u002Fdiv>\n              <div data-hot=\"act-activities\" onclick=\"{{ onActActivities }}\" style=\"{{ actActivitiesStyle }}\">\n                <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"font-weight:700; color:#2b2d38; font-size:13.5px;\">Activities Post Activity<\u002Fspan><span style=\"background:#eef0ff; color:#4146e0; font-size:11px; border-radius:5px; padding:1px 7px;\">Basic<\u002Fspan><\u002Fdiv>\n                <div style=\"font-size:12px; color:#8a8c96; margin-top:3px;\">Create a new activity record in Momentus<\u002Fdiv>\n              <\u002Fdiv>\n              <div onclick=\"{{ onActDecoy }}\" style=\"padding:13px 14px; border-bottom:1px solid #f4f5f7; cursor:pointer;\">\n                <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"font-weight:700; color:#2b2d38; font-size:13.5px;\">Account Affiliations Get Account Affiliation<\u002Fspan><span style=\"background:#f1f2f5; color:#8a8c96; font-size:11px; border-radius:5px; padding:1px 7px;\">Private<\u002Fspan><\u002Fdiv>\n                <div style=\"font-size:12px; color:#8a8c96; margin-top:3px;\">Get a single affiliation on an account by its parameters<\u002Fdiv>\n              <\u002Fdiv>\n              <div onclick=\"{{ onActDecoy }}\" style=\"padding:13px 14px; border-bottom:1px solid #f4f5f7; cursor:pointer;\">\n                <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"font-weight:700; color:#2b2d38; font-size:13.5px;\">Events Get Event<\u002Fspan><span style=\"background:#eef0ff; color:#4146e0; font-size:11px; border-radius:5px; padding:1px 7px;\">Basic<\u002Fspan><\u002Fdiv>\n                <div style=\"font-size:12px; color:#8a8c96; margin-top:3px;\">Get a single event by its event code<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- DONE overlay -->\n      <sc-if value=\"{{ showDone }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute; inset:0; background:radial-gradient(1000px 600px at 50% -10%, #23277a 0%, #14163f 50%, #0a0c24 100%); color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px; z-index:80; animation:wfbFade .4s ease;\">\n          <div style=\"width:74px; height:74px; border-radius:50%; background:#1f8a5b; display:flex; align-items:center; justify-content:center; margin-bottom:26px;\">\n            <svg width=\"38\" height=\"38\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.6\"><path d=\"M5 13l4 4L19 7\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <h1 style=\"font-size:40px; font-weight:700; margin:0 0 14px; text-align:center;\">Workflow built, tested &amp; saved<\u002Fh1>\n          <p style=\"font-size:18px; color:#cfd0ee; max-width:680px; text-align:center; line-height:1.55; margin:0 0 34px;\">You built <strong>{{ wfName }}<\u002Fstrong> end-to-end: a webhook trigger, an account lookup that references the trigger’s data, and an activity creation — then validated it in the sandbox before publishing. That’s the whole loop.<\u002Fp>\n          <div style=\"display:flex; gap:14px; align-items:center;\">\n            <button onclick=\"{{ onRestart }}\" style=\"background:#4146e0; border:none; color:#fff; font-family:inherit; font-size:16px; font-weight:700; padding:15px 32px; border-radius:11px; cursor:pointer;\">Restart the walkthrough<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- toast / nudge -->\n      <sc-if value=\"{{ showToast }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute; left:50%; bottom:70px; transform:translateX(-50%); background:#3a1d20; color:#ffd9dc; border:1px solid #7a3b40; border-radius:10px; padding:13px 20px; font-size:13.5px; z-index:90; animation:wfbToast .25s ease; max-width:520px; text-align:center;\">{{ toastMsg }}<\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n  <!-- pulse ring (positioned in JS, outside the scaled stage so fixed = viewport) -->\n  <div ref=\"{{ ringRef }}\" style=\"position:fixed; pointer-events:none; border-radius:10px; z-index:65; display:none; transition:all .18s ease; animation:wfbPulse 1.5s infinite;\"><\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.ring = React.createRef();\n    this.state = {\n      screen: 'intro',        // intro | app\n      view: 'landing',        // landing | builder | done\n      step: 0,\n      scale: 1,\n      wfName: '',\n      wfNameDraft: '',\n      nameError: false,\n      showNaming: false,\n      nodes: [],              // {id, kind:'trigger'|'accounts'|'activities', title, subtitle, configured, badge, cfg}\n      triggerConfigured: false,\n      // trigger modal\n      triggerModalOpen: false,\n      triggerType: null,      // 'app' | 'webhook' | null\n      // add step / actions\n      addStepOpen: false,\n      actionsOpen: false,\n      // config drawer\n      configOpen: false,\n      activeId: null,\n      connMenuOpen: false,\n      cfgError: false,\n      // test\n      testDockOpen: false,\n      testRunning: false,\n      testDone: false,\n      // coach\n      hintShown: false,\n      toast: '',\n    };\n    this._toastT = null;\n    this._runTimers = [];\n    this._history = [];\n    this.COACH = {\n      1:  { t:'Create a new workflow', b:'Every automation starts here. Click ADD NEW WORKFLOW to begin.', h:'The blue button is at the top-right of the list.' },\n      2:  { t:'Name your workflow', b:'Give it a clear, descriptive name so your team knows what it does, then click Create.', h:'Try “Event Task Completed Notification”.' },\n      3:  { t:'Start with a trigger', b:'A trigger defines what starts the workflow. Click the trigger card to choose one.', h:'It’s the dashed card at the top of the canvas.' },\n      4:  { t:'Choose a trigger type', b:'This workflow should run when a task is completed in the event portal. Select Universal Webhook.', h:'Pick “Universal Webhook” from the row of types.' },\n      5:  { t:'Confirm the trigger', b:'A webhook lets Momentus notify this workflow the instant the event task is completed. Click Change trigger.', h:'The blue “Change trigger” button is bottom-right of the dialog.' },\n      6:  { t:'Add your first action', b:'Now build what runs after the trigger. Click the + to add a step.', h:'The dashed + sits just below the trigger.' },\n      7:  { t:'Pick a category', b:'Steps can be Logic, Helpers, or an App action. Choose App to use a Momentus action.', h:'Select the “App” tile with the Momentus mark.' },\n      8:  { t:'Get the account', b:'First we need the account tied to the event. Select Accounts Get Account.', h:'It’s the first action in the list.' },\n      9:  { t:'Choose a connection', b:'Every Momentus action needs a connection. Open the Connection field and select the Momentus Enterprise Standard API Connection.', h:'Click the Connection dropdown, then the option.' },\n      10: { t:'Reference an earlier step', b:'Instead of typing values, pull them from earlier steps. Click fx on Org Code to reference the trigger’s output.', h:'The “fx” button is to the left of the Org Code field.' },\n      11: { t:'Complete required fields', b:'Enter the Account Code, then Save the step. Required fields are marked with *.', h:'Type any account code, then click Save step.' },\n      12: { t:'Add the next action', b:'With the account in hand, create the follow-up activity. Click + to add another step.', h:'Use the dashed + below the last node.' },\n      13: { t:'Pick a category', b:'Choose App again to add another Momentus action.', h:'Select the “App” tile.' },\n      14: { t:'Create the activity', b:'Select Activities Post Activity to create the new activity in Momentus.', h:'It’s the second action in the list.' },\n      15: { t:'Configure and save', b:'Choose the connection and add a subject for the activity, then Save the step.', h:'Set Connection and Activity Subject, then Save step.' },\n      16: { t:'Test before you publish', b:'Never publish untested. Click Run to execute the workflow in the sandbox.', h:'The blue Run button is in the bottom toolbar.' },\n      17: { t:'Review the test run', b:'Watch each step execute and inspect its output. When it succeeds, click Save to keep your workflow.', h:'The Save button is at the top-right of the builder.' },\n    };\n    this.APPS = [\n      {name:'Active Directory', mark:'AD'}, {name:'Adobe Acrobat Sign', mark:'A'},\n      {name:'Adobe Commerce Magento', mark:'M'}, {name:'Airtable', mark:'AT'},\n      {name:'Algolia', mark:'AL'}, {name:'Amazon S3', mark:'S3'},\n    ];\n    this._onResize = this._onResize.bind(this);\n  }\n\n  componentDidMount() { this._onResize(); window.addEventListener('resize', this._onResize); this._settleRing(); }\n  componentWillUnmount() { window.removeEventListener('resize', this._onResize); this._clearRun(); cancelAnimationFrame(this._raf); clearTimeout(this._ringT); }\n  componentDidUpdate() { this._settleRing(); }\n\n  _settleRing() {\n    this._positionRing();\n    cancelAnimationFrame(this._raf);\n    this._raf = requestAnimationFrame(() => this._positionRing());\n    clearTimeout(this._ringT);\n    this._ringT = setTimeout(() => this._positionRing(), 320);\n  }\n\n  _snap(s) {\n    return {\n      screen:s.screen, view:s.view, step:s.step, wfName:s.wfName, wfNameDraft:s.wfNameDraft, nameError:s.nameError,\n      showNaming:s.showNaming, triggerConfigured:s.triggerConfigured, triggerModalOpen:s.triggerModalOpen, triggerType:s.triggerType,\n      addStepOpen:s.addStepOpen, actionsOpen:s.actionsOpen, configOpen:s.configOpen, activeId:s.activeId, connMenuOpen:s.connMenuOpen,\n      cfgError:s.cfgError, testDockOpen:s.testDockOpen, testRunning:false, testDone:s.testDone, hintShown:s.hintShown,\n      nodes: (s.nodes || []).map(n => Object.assign({}, n, { cfg: Object.assign({}, n.cfg) })),\n    };\n  }\n\n  _onResize() {\n    const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);\n    this.setState({ scale: s });\n  }\n\n  _positionRing() {\n    const ring = this.ring && this.ring.current;\n    if (!ring) return;\n    const hot = this._currentHot();\n    if (!hot) { ring.style.display = 'none'; return; }\n    const el = document.querySelector('[data-hot=\"' + hot + '\"]');\n    if (!el) { ring.style.display = 'none'; return; }\n    const r = el.getBoundingClientRect();\n    ring.style.display = 'block';\n    var pad = 6;\n    ring.style.left = (r.left - pad) + 'px';\n    ring.style.top = (r.top - pad) + 'px';\n    ring.style.width = (r.width + pad * 2) + 'px';\n    ring.style.height = (r.height + pad * 2) + 'px';\n  }\n\n  _currentHot() {\n    const map = {\n      1:'addNew', 2:'nameCreate', 3:'triggerCard', 4:'ttype-webhook', 5:'confirmTrigger',\n      6:'addStep', 7:'cat-app', 8:'act-accounts', 9:'connDropdown', 10:'orgFx', 11:'saveStep',\n      12:'addStep', 13:'cat-app', 14:'act-activities', 15:'saveStep', 16:'runBtn', 17:'saveWf',\n    };\n    return map[this.state.step] || null;\n  }\n\n  nudge(msg) {\n    if (this._toastT) clearTimeout(this._toastT);\n    this.setState({ toast: msg });\n    this._toastT = setTimeout(() => this.setState({ toast: '' }), 2800);\n  }\n\n  activeNode() { return this.state.nodes.find(n => n.id === this.state.activeId); }\n\n  _clearRun() { this._runTimers.forEach(t => clearTimeout(t)); this._runTimers = []; }\n\n  renderVals() {\n    const st = this.state;\n    // history tracking (reliable across renders): push the prior render's snapshot when step advances\n    if (this._prevRender && st.step > this._prevRender.step) {\n      this._history.push(this._prevRender);\n      if (this._history.length > 80) this._history.shift();\n    }\n    this._prevRender = this._snap(st);\n    const inApp = st.screen === 'app';\n    const showBuilder = inApp && st.view === 'builder';\n    const active = this.activeNode() || {};\n    const c = this.COACH[st.step];\n\n    // node view-models\n    const nodeVMs = st.nodes.map((n, i) => {\n      const isActive = n.id === st.activeId && st.configOpen;\n      const base = 'display:flex; align-items:center; gap:12px; width:300px; padding:14px 16px; background:#fff; border-radius:12px; border:1px solid ' +\n        (isActive ? '#4146e0' : '#e6e7ec') + '; box-shadow:' + (isActive ? '0 0 0 3px rgba(65,70,224,.12)' : '0 1px 3px rgba(20,22,63,.05)') + ';';\n      const iconBg = n.kind === 'trigger' ? '#e6faf3' : '#eef0ff';\n      return {\n        title: n.title, subtitle: n.subtitle,\n        notFirst: i > 0,\n        showBadge: !n.configured,\n        iconSrc: 'resources/logo/asterisk-blue.png',\n        cardStyle: base,\n        iconStyle: 'width:38px; height:38px; border-radius:9px; background:' + iconBg + '; display:flex; align-items:center; justify-content:center; flex:none;',\n      };\n    });\n\n    // trigger modal type button styles\n    const typeBtn = (on) => 'display:flex; align-items:center; gap:6px; font-family:inherit; font-size:13px; padding:9px 14px; border-radius:8px; cursor:pointer; ' +\n      (on ? 'background:#4146e0; color:#fff; border:1px solid #4146e0;' : 'background:#fff; color:#4a4c57; border:1px solid #d9dbe1;');\n\n    const confirmOn = st.triggerType === 'webhook';\n    const confirmTriggerStyle = 'font-family:inherit; font-size:14px; font-weight:600; padding:9px 20px; border-radius:8px; border:none; ' +\n      (confirmOn ? 'background:#4146e0; color:#fff; cursor:pointer;' : 'background:#c9ccf5; color:#fff; cursor:not-allowed;');\n\n    // test history + steps\n    const testHistory = [];\n    if (st.testRunning) testHistory.push({ label:'Running', dur:'→', running:true });\n    else if (st.testDone) testHistory.push({ label:'2026-05-18 14:34:54', dur:'0.9s', running:false });\n    testHistory.push({ label:'2026-05-18 09:42:21', dur:'2.8s', running:false });\n    testHistory.push({ label:'2026-05-18 08:35:07', dur:'6.1s', running:false });\n    const testHistoryVM = testHistory.map((h,i) => ({\n      label: h.label, dur: h.dur,\n      style: 'display:flex; align-items:center; gap:8px; padding:10px 16px; border-bottom:1px solid #f6f7f9; ' + (i===0 && (st.testRunning||st.testDone) ? 'background:#eef0ff;' : ''),\n      dotStyle: 'width:8px; height:8px; border-radius:50%; flex:none; background:' + (h.running ? '#4146e0' : (i===0? '#1f8a5b' : '#c2c4cc')) + ';',\n    }));\n\n    const testStepVMs = st.nodes.map((n, i) => {\n      let icon = '✳', dur = '';\n      if (st.testDone) dur = [ '1ms', '114ms', '150ms' ][i] || '2ms';\n      const running = st.testRunning;\n      return {\n        title: n.title, icon: running ? '…' : '✳', dur,\n        iconStyle: 'width:18px; height:18px; border-radius:50%; background:' + (running?'#eef0ff':'#e7f6ee') + '; color:' + (running?'#4146e0':'#1f8a5b') + '; font-size:11px; display:flex; align-items:c Actions: st.actionsOpen,\n      catAppStyle: 'border:1px solid #c9ccf5; background:#f7f8ff; border-radius:10px; padding:18px 10px; text-align:center; cursor:pointer;',\n      actAccountsStyle: 'padding:13px 14px; border-bottom:1px solid #f4f5f7; border-radius:8px; cursor:pointer;',\n      actActivitiesStyle: 'padding:13px 14px; border-bottom:1px solid #f4f5f7; border-radius:8px; cursor:pointer;',\n\n      // toast\n      showToast: !!st.toast,\n      toastMsg: st.toast,\n\n      ringRef: this.ring,\n\n      // ---- handlers ----\n      onBegin: () => this.setState({ screen:'app', view:'landing', step:1 }),\n      onNoop: (e) => { if (e && e.preventDefault) e.preventDefault(); },\n\n      onAddNew: () => { if (st.step === 1) this.setState({ showNaming:true, step:2, wfNameDraft:'', nameError:false }); else this.nudge('Let’s follow the current step first.'); },\n      onCloseNaming: () => this.setState({ showNaming:false, step:1 }),\n      onNameInput: (e) => this.setState({ wfNameDraft: e.target.value, nameError:false }),\n      onNameCreate: () => {\n        if (!st.wfNameDraft.trim()) { this.setState({ nameError:true }); this.nudge('A workflow needs a name before you can create it.'); return; }\n        this.setState({ showNaming:false, wfName: st.wfNameDraft.trim(), view:'builder', step:3, triggerConfigured:false, nodes:[] });\n      },\n\n      onExit: () => this.nudge('Finish the walkthrough to head back — you’re almost there!'),\n\n      onTriggerCard: () => { if (st.step === 3) this.setState({ triggerModalOpen:true, step:4, triggerType:null }); else this.nudge('Not yet — follow the coach on the left.'); },\n      onCloseTrigger: () => this.setState({ triggerModalOpen:false, step:3, triggerType:null }),\n      onTypeApp: () => this.setState({ triggerType:'app' }),\n      onTypeWebhook: () => { this.setState({ triggerType:'webhook' }); if (st.step === 4) this.setState({ step:5 }); },\n      onTypeOther: () => this.nudge('For this workflow we’ll use Universal Webh ActActivities: () => {\n        if (st.step !== 14) { this.nudge('Add the activity step when the coach asks for it.'); return; }\n        const node = { id:'n'+Date.now(), kind:'activities', title:'Activities Post Activity', subtitle:'Momentus Enterprise Standard API', configured:false, cfg:{ conn:false, subject:'' } };\n        this.setState({ actionsOpen:false, nodes:[...st.nodes, node], activeId:node.id, configOpen:true, cfgError:false, connMenuOpen:false, step:15 });\n      },\n      onActDecoy: () => this.nudge('That’s not the action we need right now — follow the coach.'),\n\n      onOpenConn: () => this.setState({ connMenuOpen: !st.connMenuOpen }),\n      onSelectConn: () => {\n        const n = this.activeNode(); if (n) n.cfg.conn = true;\n        this.setState({ connMenuOpen:false });\n        if (st.step === 9) this.setState({ step:10 });\n      },\n      onOrgFx: () => {\n        const n = this.activeNode(); if (n) n.cfg.org = true;\n        this.forceUpdate();\n        if (st.step === 10) this.setState({ step:11 });\n      },\n      onAccountInput: (e) => { const n = this.activeNode(); if (n) { n.cfg.accountCode = e.target.value; this.forceUpdate(); } },\n      onSubjectInput: (e) => { const n = this.activeNode(); if (n) { n.cfg.subject = e.target.value; this.forceUpdate(); } },\n      onCloseDrawer: () => this.setState({ configOpen:false, connMenuOpen:false }),\n      onSaveStep: () => {\n        const n = this.activeNode(); if (!n) return;\n        let ok = false;\n        if (n.kind === 'accounts') ok = n.cfg.conn && n.cfg.org && n.cfg.accountCode.trim();\n        if (n.kind === 'activities') ok = n.cfg.conn && n.cfg.subject.trim();\n        if (!ok) { this.setState({ cfgError:true }); this.nudge('Some required fields are still empty — fill in every * field, then Save.'); return; }\n        n.configured = true;\n        if (st.step === 11) this.setState({ configOpen:false, cfgError:false, connMenuOpen:false, step:12 });\n        else if (st.step === 1
